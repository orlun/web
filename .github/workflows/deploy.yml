name: Deploy to GitHub Pages

on:
  # Se ejecuta cada vez que subes código a la rama principal
  push:
    branches: ["main", "master"]
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: |
          echo "VITE_SUPABASE_URL=https://tuiwhsmcrxoznsolsfth.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1aXdoc21jcnhvem5zb2xzZnRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MTg5NzYsImV4cCI6MjA5ODE5NDk3Nn0.J3VtbQtYDxaqsay3MpWayhUfuskkdyiewV89VAambJo" >> .env
          npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
